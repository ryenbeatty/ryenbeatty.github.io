name: Deploy to Codeberg Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: research_pod 
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - run: bun --version
      - run: bun install
      - run: bun run build
      - uses: git-pages/action@v2
        with:
          site: "https://frome.codeberg.page/"
          token: ${{ forge.token }}
          source: dist/

